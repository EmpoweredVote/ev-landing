services:
  - type: web
    name: ev-landing
    runtime: static
    buildCommand: ""
    staticPublishPath: ./
    pullRequestPreviewsEnabled: true
    routes:
      - type: redirect
        source: /framer
        destination: https://framer.empowered.vote
        permanent: false
      - type: redirect
        source: /framer/*
        destination: https://framer.empowered.vote/:splat
        permanent: false
      - type: redirect
        source: /donate
        destination: https://financials.empowered.vote
        permanent: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
